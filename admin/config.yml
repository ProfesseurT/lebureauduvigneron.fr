# Décap CMS — Configuration
# Teddy se connecte sur lebureauduvigneron.fr/admin pour écrire ses articles

backend:
  name: git-gateway
  branch: main

# Langue française dans l'interface
locale: fr

# Où sont stockées les images uploadées
media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "posts"
    label: "Articles"
    folder: "src/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}_{{slug}}"
    preview_path: "articles/{{slug}}/"
    fields:
      - { label: "Titre", name: "title", widget: "string", hint: "Le titre de l'article — phrase forte, pas de 'voici 5 leçons'" }
      - { label: "Date de publication", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Description (résumé)", name: "description", widget: "text", hint: "2-3 phrases. Ce résumé apparaît dans la liste et sur Google." }
      - label: "Pilier éditorial"
        name: "pilier"
        widget: "select"
        options:
          - { label: "🍇 Terrain viti", value: "Terrain viti 🍇" }
          - { label: "🏗️ Organisation / Scale", value: "Organisation 🏗️" }
          - { label: "🔧 Process", value: "Process 🔧" }
          - { label: "📊 Marketing", value: "Marketing 📊" }
          - { label: "🎓 Enseignement", value: "Enseignement 🎓" }
      - { label: "Temps de lecture", name: "temps_lecture", widget: "string", default: "5 min", required: false }
      - { label: "Contenu", name: "body", widget: "markdown", hint: "Écris comme tu parles. Phrases courtes. Chiffres vérifiables. Scènes concrètes." }
      - { label: "Tags", name: "tags", widget: "hidden", default: "posts" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "article.njk" }
